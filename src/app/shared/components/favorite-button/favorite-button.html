<button mat-icon-button class="btn-wishlist" [class.is-favorite]="isFavorite()"
	[class.is-animating]="isAnimating()" (click)="toggleFavorite($event)">
	<mat-icon>{{ isFavorite() ? 'favorite' : 'favorite_border' }}</mat-icon>
	@if (isAnimating() && isFavorite()) {
	<span class="heart-burst"></span>
	}
</button>
