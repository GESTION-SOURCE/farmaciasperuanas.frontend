<div class="not-found-container">
	<div class="not-found-content">
		<div class="error-illustration">
			<mat-icon class="error-icon">search_off</mat-icon>
		</div>
		<h1 class="error-title">¡Ups! Producto no encontrado</h1>
		<p class="error-message">
			Lo sentimos, no pudimos encontrar el producto o la página que estás buscando.
			Es posible que el enlace sea incorrecto o el producto ya no esté disponible.
		</p>
		<div class="actions">
			<button mat-flat-button class="btn-primary" routerLink="/">
				<mat-icon>home</mat-icon>
				Volver al inicio
			</button>
		</div>
	</div>
</div>
