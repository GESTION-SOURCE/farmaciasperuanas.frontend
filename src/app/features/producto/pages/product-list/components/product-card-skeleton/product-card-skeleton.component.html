@for (item of skeletonItems; track $index) {
<div class="skeleton-card">
	<div class="skeleton-image skeleton-shimmer"></div>
	<div class="skeleton-content">
		<div class="skeleton-brand skeleton-shimmer"></div>
		<div class="skeleton-name skeleton-shimmer"></div>
		<div class="skeleton-name short skeleton-shimmer"></div>
		<div class="skeleton-prices">
			<div class="skeleton-price skeleton-shimmer"></div>
			<div class="skeleton-price-promo skeleton-shimmer"></div>
		</div>
		<div class="skeleton-variant skeleton-shimmer"></div>
	</div>
	<div class="skeleton-actions">
		<div class="skeleton-button skeleton-shimmer"></div>
	</div>
</div>
}
