<nav class="navbar-container">
	<div #navbarWrapper class="navbar-main-wrapper" [style.height.px]="isSticky ? stickyNavbarHeight : navbarHeight">
		<div #navbarMain class="navbar-main container-fluid" [class.is-sticky]="isSticky">
			<div class="row align-items-center navbar-row">
				<!-- Hamburger Menu Button -->
				<button class="mobile-menu-btn d-lg-none" (click)="toggleMobileMenu()">
					<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#354159" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<line x1="3" y1="12" x2="21" y2="12"></line>
						<line x1="3" y1="6" x2="21" y2="6"></line>
						<line x1="3" y1="18" x2="21" y2="18"></line>
					</svg>
				</button>

				<div class="navbar-logo-container">
					<a routerLink="/" class="navbar-logo">
						<img src="assets/logotipo-inkafarma.svg" alt="Inkafarma">
					</a>
				</div>

				<!-- Search Bar -->
				<div class="navbar-search-container">
					<div class="search-bar">
						<input type="text" placeholder="Busca una marca o producto" 
							(focus)="isSearchFocused = true" 
							(blur)="isSearchFocused = false">
						<button class="search-btn">
							<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
								stroke-linecap="round" stroke-linejoin="round">
								<circle cx="11" cy="11" r="8"></circle>
								<line x1="21" y1="21" x2="16.65" y2="16.65"></line>
							</svg>
						</button>
					</div>
				</div>

				<!-- Cart Button -->
				<div class="navbar-cart-container">
					<button class="cart-btn">
						<img src="assets/cart.svg" alt="Cart" class="cart-icon">
						<span class="cart-count">0</span>
					</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Categories -->
	<div class="navbar-categories d-none d-lg-block">
		<div class="container-fluid">
			<div class="row">
				<ul class="categories-list">
					<li><a href="#">Dermocosmética</a></li>
					<li><a href="#">Farmacia</a></li>
					<li><a href="#">Bienestar</a></li>
					<li><a href="#">Infantil</a></li>
					<li><a href="#">Fotoprotección</a></li>
					<li><a href="#">Inkaclub</a></li>
					<li><a href="#">Tienda 24 hrs.</a></li>
					<li><a href="#">Catálogo</a></li>
				</ul>
			</div>
		</div>
	</div>

	<!-- Search Overlay -->
	<div class="search-overlay" [class.active]="isSearchFocused"></div>

	<!-- Off-canvas Mobile Menu -->
	<div class="mobile-menu-overlay" [class.open]="isMobileMenuOpen" (click)="toggleMobileMenu()"></div>
	<aside class="mobile-sidebar" [class.open]="isMobileMenuOpen">
		<div class="sidebar-header">
			<h3>Menú</h3>
			<button class="close-btn" (click)="toggleMobileMenu()">
				<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
					<line x1="18" y1="6" x2="6" y2="18"></line>
					<line x1="6" y1="6" x2="18" y2="18"></line>
				</svg>
			</button>
		</div>
		<div class="sidebar-content">
			<ul class="mobile-categories-list">
				<li><a href="#">Dermocosmética <span class="arrow">›</span></a></li>
				<li><a href="#">Farmacia <span class="arrow">›</span></a></li>
				<li><a href="#">Bienestar <span class="arrow">›</span></a></li>
				<li><a href="#">Infantil <span class="arrow">›</span></a></li>
				<li><a href="#">Fotoprotección <span class="arrow">›</span></a></li>
				<li><a href="#">Inkaclub <span class="arrow">›</span></a></li>
				<li><a href="#">Tienda 24 hrs. <span class="arrow">›</span></a></li>
				<li><a href="#">Catálogo <span class="arrow">›</span></a></li>
			</ul>
		</div>
	</aside>
</nav>
